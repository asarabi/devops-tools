services:
  repo-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repo-manager
    restart: unless-stopped
    ports:
      - "8081:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - repo-manager-data:/app/data
    environment:
      - CONFIG_PATH=/app/config.yaml
      - TZ=Asia/Seoul

volumes:
  repo-manager-data:
