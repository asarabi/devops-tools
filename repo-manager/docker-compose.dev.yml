services:
  repo-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repo-manager-dev
    ports:
      - "8081:8000"
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml:ro
      - ${HOME}/repo-manager-data:/app/data
    environment:
      - CONFIG_PATH=/app/config.yaml
      - TZ=Asia/Seoul
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
