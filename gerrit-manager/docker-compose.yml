services:
  gerrit-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gerrit-manager
    restart: unless-stopped
    ports:
      - "8081:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - gerrit-manager-data:/app/data
    environment:
      - CONFIG_PATH=/app/config.yaml
      - TZ=Asia/Seoul

volumes:
  gerrit-manager-data:
