services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - ${HOME}/jenkins_backup:/var/jenkins_home
    environment:
      - TZ=Asia/Seoul
    entrypoint: >
      bash -c "
        chown -R jenkins:jenkins /var/jenkins_home &&
        exec su jenkins -c /usr/local/bin/jenkins.sh
      "
    user: root
